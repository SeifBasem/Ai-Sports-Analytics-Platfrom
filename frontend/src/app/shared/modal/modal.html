<div *ngIf="isOpen" class="fixed inset-0 z-[80] flex items-center justify-center p-4">
  <button type="button" class="absolute inset-0 bg-black/70" aria-label="Close modal" (click)="close()"></button>

  <section [class]="'relative max-h-[90vh] w-full overflow-hidden rounded-2xl border border-gray-800/70 bg-gray-900 shadow-xl ' + panelSizeClasses">
    <header class="flex items-center justify-between border-b border-gray-800/70 px-5 py-4">
      <h2 class="text-lg font-semibold text-white">{{ title }}</h2>
      <button type="button" class="inline-flex h-9 w-9 items-center justify-center rounded-xl text-gray-400 transition-colors hover:bg-gray-800 hover:text-white" title="Close" (click)="close()">
        <lucide-icon name="x" size="19" strokeWidth="2"></lucide-icon>
      </button>
    </header>

    <div class="max-h-[calc(90vh-73px)] overflow-y-auto p-5">
      <ng-content></ng-content>
    </div>
  </section>
</div>
