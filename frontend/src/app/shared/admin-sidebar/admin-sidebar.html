<aside
  [class]="'fixed left-0 top-0 z-50 h-full w-72 border-r border-gray-800/50 bg-gray-900/50 backdrop-blur-xl shadow-xl transition-transform duration-300 lg:translate-x-0 lg:shadow-none ' + ((sidebarOpen$ | async) ? 'translate-x-0' : '-translate-x-full')"
>
  <div class="flex h-full flex-col">
    <div class="flex items-center justify-between border-b border-gray-800/50 px-5 py-5">
      <div class="flex items-center gap-3">
        <img src="/brand/goalithm-logo.png" alt="Goalithm logo" class="h-11 w-12 object-contain" />
        <div>
          <h2 class="font-semibold text-white">Goalithm</h2>
          <p class="text-xs text-gray-400">Admin cycle</p>
        </div>
      </div>
      <button type="button" class="inline-flex h-9 w-9 items-center justify-center rounded-xl text-gray-400 transition-colors hover:bg-gray-800/70 hover:text-white lg:hidden" title="Close sidebar" (click)="closeSidebar()">
        <lucide-icon name="x" size="19" strokeWidth="2"></lucide-icon>
      </button>
    </div>

    <nav class="flex-1 space-y-2 px-4 py-5">
      <button
        *ngFor="let item of menuItems"
        type="button"
        (click)="navigate(item.route)"
        [class]="'flex w-full items-center gap-3 rounded-xl px-4 py-3 text-left text-sm font-semibold transition-all ' + (isActive(item.route) ? 'border border-blue-500/30 bg-gradient-to-r from-blue-500/20 to-green-500/20 text-white' : 'text-gray-400 hover:bg-gray-800/50 hover:text-white')"
      >
        <lucide-icon [name]="item.icon" size="19" strokeWidth="2"></lucide-icon>
        <span>{{ item.label }}</span>
      </button>
    </nav>
  </div>
</aside>
