<aside
    [class]="'fixed left-0 top-0 h-full bg-gray-900/50 backdrop-blur-xl border-r border-gray-800/50 transition-all duration-300 z-50 w-64 ' + ((sidebarOpen$ | async) ? 'translate-x-0' : '-translate-x-full')">
    <div class="p-6 border-b border-gray-800/50 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <img src="/brand/goalithm-logo.png" alt="Goalithm logo" class="h-11 w-12 object-contain" />
            <div>
                <h1 class="text-white font-semibold">Goalithm</h1>
                <p class="text-xs text-gray-400">Football intelligence</p>
            </div>
        </div>
        <button (click)="closeSidebar()" class="lg:hidden text-gray-400 hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>

    <nav class="p-4 space-y-2">
        <button *ngFor="let item of menuItems" (click)="navigate(item.route)" [class]="'w-full flex items-center text-left gap-3 px-4 py-3 rounded-xl transition-all ' + (isActive(item.route) 
        ? 'bg-gradient-to-r from-blue-500/20 to-green-500/20 text-white border border-blue-500/30' 
        : 'text-gray-400 hover:text-white hover:bg-gray-800/50')">
            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path *ngIf="item.icon === 'home'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                </path>
                <path *ngIf="item.icon === 'upload'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                <path *ngIf="item.icon === 'play'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
                <path *ngIf="item.icon === 'play'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                <path *ngIf="item.icon === 'bar-chart'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
                </path>
                <path *ngIf="item.icon === 'clock'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 8v4l3 2m6-2a9 9 0 11-18 0 9 9 0 0118 0z">
                </path>
                <path *ngIf="item.icon === 'flame'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z">
                </path>
                <path *ngIf="item.icon === 'file-text'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                </path>
                <path *ngIf="item.icon === 'settings'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                </path>
                <path *ngIf="item.icon === 'settings'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path *ngIf="item.icon === 'cycle'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0A8.003 8.003 0 005.42 15m0 0H15"></path>
            </svg>
            <span>{{ item.label }}</span>
        </button>
    </nav>
</aside>
