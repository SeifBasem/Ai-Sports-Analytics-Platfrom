<section class="rounded-2xl border border-gray-800/50 bg-gray-900/50 p-6 shadow-sm backdrop-blur-xl transition-all hover:border-blue-500/30">
  <div class="flex items-start justify-between gap-4">
    <div>
      <p class="text-sm font-medium text-gray-400">{{ label }}</p>
      <strong class="mt-3 block text-3xl font-bold text-white">{{ value }}</strong>
    </div>
    <span [class]="'flex h-12 w-12 items-center justify-center rounded-xl border ' + accentClasses">
      <lucide-icon [name]="icon" size="22" strokeWidth="2"></lucide-icon>
    </span>
  </div>
</section>
