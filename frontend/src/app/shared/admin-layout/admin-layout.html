<div class="min-h-screen bg-gradient-to-br from-gray-950 via-gray-900 to-gray-950 text-white">
  <app-admin-sidebar></app-admin-sidebar>

  <button
    *ngIf="sidebarOpen$ | async"
    type="button"
    class="fixed inset-0 z-30 bg-black/50 lg:hidden"
    aria-label="Close sidebar"
    (click)="closeSidebar()"
  ></button>

  <div class="min-h-screen transition-all duration-300 lg:pl-72">
    <header class="sticky top-0 z-20 border-b border-gray-800/50 bg-gray-900/30 backdrop-blur-xl">
      <div class="flex min-h-16 items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8">
        <div class="flex min-w-0 items-center gap-3">
          <button type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-gray-700/70 bg-gray-800/70 text-gray-300 shadow-sm transition-colors hover:bg-gray-800 hover:text-white lg:hidden" title="Open sidebar" (click)="toggleSidebar()">
            <lucide-icon name="menu" size="20" strokeWidth="2"></lucide-icon>
          </button>
          <div class="min-w-0">
            <p class="text-[0.7rem] font-extrabold uppercase tracking-widest text-sky-400 mb-1">Goalithm Admin</p>
            <h1 class="truncate text-[1.8rem] font-extrabold text-white">{{ pageTitle }}</h1>
          </div>
        </div>

        <div class="flex items-center gap-3">
          <button
            type="button"
            class="theme-toggle inline-flex h-10 w-10 items-center justify-center rounded-xl border border-gray-700/70 bg-gray-800/60 text-gray-300 transition-colors hover:bg-gray-800 hover:text-white"
            [title]="(theme$ | async) === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
            (click)="toggleTheme()"
          >
            <lucide-icon [name]="(theme$ | async) === 'dark' ? 'sun' : 'moon'" size="19" strokeWidth="2"></lucide-icon>
          </button>

          <div class="flex items-center gap-3 rounded-xl border border-gray-800/60 bg-gray-900/60 px-3 py-2 shadow-sm">
          <div class="flex h-10 w-10 items-center justify-center rounded-full bg-gradient-to-br from-blue-500 to-green-500 text-sm font-bold text-white">{{ getUserInitials(currentUser$ | async) }}</div>
          <div class="hidden text-sm sm:block">
            <p class="font-semibold text-white">{{ (currentUser$ | async)?.fullName || 'Admin Panel' }}</p>
            <p class="text-xs text-gray-400">Admin access</p>
          </div>
          </div>
          <button
            type="button"
            class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-gray-700/70 bg-gray-800/60 text-gray-300 transition-colors hover:bg-gray-800 hover:text-white"
            title="Logout"
            (click)="logout()"
          >
            <lucide-icon name="log-out" size="18" strokeWidth="2"></lucide-icon>
          </button>
        </div>
      </div>
    </header>

    <main class="px-4 py-6 sm:px-6 lg:px-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
