<div class="min-h-screen bg-gradient-to-br from-gray-950 via-gray-900 to-gray-950 flex items-center justify-center p-6">
  <button
    type="button"
    class="theme-toggle fixed right-6 top-6 inline-flex h-11 w-11 items-center justify-center rounded-xl border border-gray-700/70 bg-gray-800/60 text-gray-300 backdrop-blur-xl transition-colors hover:bg-gray-800 hover:text-white"
    [title]="(theme$ | async) === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
    (click)="toggleTheme()"
  >
    <lucide-icon [name]="(theme$ | async) === 'dark' ? 'sun' : 'moon'" size="20" strokeWidth="2"></lucide-icon>
  </button>

  <div class="w-full max-w-lg">
    <div class="text-center mb-8">
      <img src="/brand/goalithm-logo.png" alt="Goalithm logo" class="mx-auto mb-4 h-20 w-28 object-contain" />
      <h1 class="text-3xl font-bold text-white mb-2">Create Account</h1>
      <p class="text-gray-400">Join Goalithm</p>
    </div>

    <div class="bg-gray-900/50 backdrop-blur-xl border border-gray-800/50 rounded-2xl p-8">
      <form (ngSubmit)="onSubmit()">
        <div class="grid gap-5 sm:grid-cols-2">
          <div class="sm:col-span-2">
            <label for="fullName" class="block text-sm font-medium text-gray-300 mb-2">Full Name</label>
            <input id="fullName" type="text" [(ngModel)]="fullName" name="fullName" class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="Your full name" required />
          </div>

          <div>
            <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username</label>
            <input id="username" type="text" [(ngModel)]="username" name="username" class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="username" required />
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
            <input id="email" type="email" [(ngModel)]="email" name="email" class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="you@example.com" required />
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
            <input id="password" type="password" [(ngModel)]="password" name="password" class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="At least 6 characters" required />
          </div>

          <div>
            <label for="confirmPassword" class="block text-sm font-medium text-gray-300 mb-2">Confirm Password</label>
            <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="Repeat password" required />
          </div>
        </div>

        <div *ngIf="errorMessage" class="mt-5 mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-xl">
          <p class="text-red-400 text-sm">{{ errorMessage }}</p>
        </div>

        <button type="submit" [disabled]="isLoading" class="mt-6 w-full py-3 bg-gradient-to-r from-blue-500 to-green-500 text-white rounded-xl font-semibold hover:from-blue-600 hover:to-green-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-900 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
          <span *ngIf="!isLoading">Create Account</span>
          <span *ngIf="isLoading">Creating account...</span>
        </button>
      </form>

      <div class="mt-6 text-center">
        <button type="button" class="text-sm font-semibold text-cyan-300 hover:text-cyan-200" (click)="goToLogin()">
          Already have an account? Sign in
        </button>
      </div>
    </div>
  </div>
</div>
