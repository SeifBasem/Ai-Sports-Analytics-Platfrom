<div class="space-y-5">
  <div *ngIf="notice" class="flex items-center justify-between gap-3 rounded-xl border border-cyan-500/30 bg-cyan-500/10 px-4 py-3 text-sm font-medium text-cyan-300">
    <span>{{ notice }}</span>
    <button type="button" class="rounded-md p-1 hover:bg-cyan-500/20" title="Dismiss" (click)="closeNotice()">
      <lucide-icon name="x" size="16" strokeWidth="2"></lucide-icon>
    </button>
  </div>

  <app-data-table
    [columns]="columns"
    [rows]="rows"
    [actions]="actions"
    emptyMessage="No analysis requests found."
    (actionSelected)="handleAction($event)"
  ></app-data-table>
</div>

<app-modal [isOpen]="selectedRequest !== null" title="Analysis request" size="lg" (closed)="selectedRequest = null">
  <div *ngIf="selectedRequest as request" class="space-y-5">
    <div class="flex flex-wrap items-center gap-2">
      <app-status-badge [status]="request.status"></app-status-badge>
      <span class="text-sm font-semibold text-gray-400">{{ request.id }}</span>
    </div>
    <div>
      <p class="text-sm font-semibold text-gray-400">Video Title</p>
      <h3 class="mt-1 text-xl font-semibold text-white">{{ request.videoTitle }}</h3>
    </div>
    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
      <div class="rounded-xl border border-gray-800/70 bg-gray-800/35 p-3">
        <p class="text-xs font-semibold uppercase text-gray-400">Requested By</p>
        <p class="mt-1 font-semibold text-white">{{ request.requestedBy }}</p>
      </div>
      <div class="rounded-xl border border-gray-800/70 bg-gray-800/35 p-3">
        <p class="text-xs font-semibold uppercase text-gray-400">Requested At</p>
        <p class="mt-1 font-semibold text-white">{{ request.requestedAt }}</p>
      </div>
      <div class="rounded-xl border border-gray-800/70 bg-gray-800/35 p-3">
        <p class="text-xs font-semibold uppercase text-gray-400">Started At</p>
        <p class="mt-1 font-semibold text-white">{{ request.startedAt || '-' }}</p>
      </div>
      <div class="rounded-xl border border-gray-800/70 bg-gray-800/35 p-3">
        <p class="text-xs font-semibold uppercase text-gray-400">Completed At</p>
        <p class="mt-1 font-semibold text-white">{{ request.completedAt || '-' }}</p>
      </div>
    </div>
    <div *ngIf="request.errorMessage" class="rounded-lg border border-rose-200 bg-rose-50 p-4 text-sm font-medium text-rose-800">
      {{ request.errorMessage }}
    </div>
  </div>
</app-modal>
