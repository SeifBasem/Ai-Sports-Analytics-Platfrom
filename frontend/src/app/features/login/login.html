<div class="min-h-screen bg-gradient-to-br from-gray-950 via-gray-900 to-gray-950 flex items-center justify-center p-6">
  <button type="button"
    class="theme-toggle fixed right-6 top-6 inline-flex h-11 w-11 items-center justify-center rounded-xl border border-gray-700/70 bg-gray-800/60 text-gray-300 backdrop-blur-xl transition-colors hover:bg-gray-800 hover:text-white"
    [title]="(theme$ | async) === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'" (click)="toggleTheme()">
    <lucide-icon [name]="(theme$ | async) === 'dark' ? 'sun' : 'moon'" size="20" strokeWidth="2"></lucide-icon>
  </button>

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <img src="/brand/goalithm-logo.png" alt="Goalithm logo" class="mx-auto mb-4 h-20 w-28 object-contain" />
      <h1 class="text-3xl font-bold text-white mb-2">Goalithm</h1>
      <p class="text-gray-400">Sign in to your account</p>
    </div>

    <div class="bg-gray-900/50 backdrop-blur-xl border border-gray-800/50 rounded-2xl p-8">
      <form (ngSubmit)="onSubmit()">
        <div class="mb-6">
          <label for="username" class="block text-sm font-medium text-gray-300 mb-2">Username or Email</label>
          <input type="text" id="username" [(ngModel)]="username" name="username"
            class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            placeholder="Enter your username or email" required />
        </div>

        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
          <input type="password" id="password" [(ngModel)]="password" name="password"
            class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
            placeholder="Enter your password" required />
        </div>

        <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-xl">
          <p class="text-red-400 text-sm">{{ errorMessage }}</p>
        </div>

        <button type="submit" [disabled]="isLoading"
          class="w-full py-3 bg-gradient-to-r from-blue-500 to-green-500 text-white rounded-xl font-semibold hover:from-blue-600 hover:to-green-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-gray-900 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
          <span *ngIf="!isLoading">Sign In</span>
          <span *ngIf="isLoading" class="flex items-center justify-center">
            <svg class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>
            Signing in...
          </span>
        </button>
      </form>

      <div class="mt-6 space-y-3 text-center">
        <p class="text-sm text-gray-400"></p>
        <button type="button" class="text-sm font-semibold text-cyan-300 hover:text-cyan-200" (click)="goToRegister()">
          Create a user account
        </button>
      </div>
    </div>

    <div class="mt-8 text-center">
      <p class="text-xs text-gray-500">Powered by Goalithm AI Engine v2.0</p>
    </div>
  </div>
</div>
