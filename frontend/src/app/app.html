<div *ngIf="!showLayout">
  <router-outlet></router-outlet>
</div>

<div *ngIf="showLayout" class="min-h-screen bg-gradient-to-br from-gray-950 via-gray-900 to-gray-950">
  <app-sidebar></app-sidebar>

  <div [class]="'transition-all duration-300 ' + ((sidebarOpen$ | async) ? 'lg:ml-64' : 'ml-0')">
    <header class="bg-gray-900/30 backdrop-blur-xl border-b border-gray-800/50 sticky top-0 z-40">
      <div class="px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <button (click)="toggleSidebar()" class="text-gray-400 hover:text-white transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
          <img src="/brand/goalithm-logo.png" alt="Goalithm logo" class="h-10 w-12 object-contain" />
          <h1 class="text-white text-[1.5rem] font-extrabold">{{ title }}</h1>
        </div>
        <div class="flex items-center gap-4">
          <button
            type="button"
            class="theme-toggle inline-flex h-10 w-10 items-center justify-center rounded-xl border border-gray-700/70 bg-gray-800/60 text-gray-300 transition-colors hover:bg-gray-800 hover:text-white"
            [title]="(theme$ | async) === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
            (click)="toggleTheme()"
          >
            <lucide-icon [name]="(theme$ | async) === 'dark' ? 'sun' : 'moon'" size="19" strokeWidth="2"></lucide-icon>
          </button>
          <div
            class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-green-500 flex items-center justify-center cursor-pointer">
            <span class="text-white text-sm font-bold">{{ getUserInitials(currentUser$ | async) }}</span>
          </div>
          <button
            type="button"
            class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-gray-700/70 bg-gray-800/60 text-gray-300 transition-colors hover:bg-gray-800 hover:text-white"
            title="Logout"
            (click)="logout()"
          >
            <lucide-icon name="log-out" size="18" strokeWidth="2"></lucide-icon>
          </button>
        </div>
      </div>
    </header>

    <main class="p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
